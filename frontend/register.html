<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - BusFlux</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="fade-in">

  <header class="main-header">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <i class="fas fa-bus-alt"></i> BusFlux
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="buses.html">Buses</a></li>
        <li><a href="register.html" class="active">Register</a></li>
      </ul>
    </div>
  </header>

  <div class="container">
    <h1><span>BusFlux</span> Register</h1>
    <p class="subtitle">Create an account for seamless ticket booking</p>

    <form id="registerForm">
      <div class="form-group">
        <label class="form-label" for="name">Full Name</label>
        <div class="input-wrapper">
          <input type="text" id="name" placeholder="Enter your full name" required>
          <i class="fas fa-user"></i>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <div class="input-wrapper">
          <input type="email" id="email" placeholder="Enter your email" required>
          <i class="fas fa-envelope"></i>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="Create a password" required>
          <i class="fas fa-lock"></i>
        </div>
      </div>

      <button type="submit"><i class="fas fa-user-plus"></i> Register</button>
    </form>

    <p id="message" style="text-align: center; margin-top: 15px; color: var(--text-muted); font-size: 0.95rem;"></p>

    <div class="form-footer-link">
      Already have an account? <a href="login.html">Login here</a>
    </div>
  </div>

  <div id="toastContainer"></div>

  <script src="script.js"></script>
</body>
</html>
