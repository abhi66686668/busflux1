<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Available Buses - BusFlux</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="fade-in">

  <header class="main-header">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <i class="fas fa-bus-alt"></i> BusFlux
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="buses.html" class="active">Buses</a></li>
        <li><a href="login.html" class="nav-btn">Login</a></li>
      </ul>
    </div>
  </header>

  <div class="container container-wide">
    <h1>Available <span>Buses</span></h1>
    <p class="subtitle">Select a route and reserve your ticket</p>

    <div id="busList">
      <div style="text-align: center; padding: 40px; color: var(--text-muted);">
        <i class="fas fa-spinner fa-spin" style="font-size: 2.5rem; margin-bottom: 15px; color: #6366f1;"></i>
        <p>Loading available routes...</p>
      </div>
    </div>
  </div>

  <div id="toastContainer"></div>

  <script src="script.js"></script>
</body>
</html>
